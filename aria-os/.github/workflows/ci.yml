name: Aria CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/api/requirements.txt
        pip install flake8 pytest
    - name: Lint with flake8
      run: |
        flake8 apps/api packages/core_ai --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test backend
      run: |
        # pytest apps/api/tests

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Install dependencies
      working-directory: ./apps/web
      run: npm ci
    - name: Lint Next.js
      working-directory: ./apps/web
      run: npm run lint
    - name: Build Next.js
      working-directory: ./apps/web
      run: npm run build
